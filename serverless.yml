service: agigateway-email

provider:
  name: aws
  runtime: nodejs20.x
  environment:
    RESEND_API_KEY: ${env:RESEND_API_KEY}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "*"

functions:
  sendEmail:
    handler: lambda.handler
    events:
      - http:
          path: /api/send-email
          method: post
          cors: true
      - http:
          path: /api/send-email
          method: options
          cors: true